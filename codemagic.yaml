workflows:
  ios-workflow:
    name: iOS Workflow

    integrations:
      app_store_connect: poker-app-codemagic

    environment:
      flutter: stable
      xcode: latest
      ios_signing:
        distribution_type: app_store
        bundle_identifier: com.joetseng.pokertablereservation
        automatic_code_signing: true

    scripts:
      - flutter clean
      - flutter pub get
      - cd ios && pod install && cd ..

      # ✅ 正確寫法（這行很重要）
      - name: Set up code signing
        script: xcode-project use-profiles

      - name: Build IPA
        script: |
          xcode-project build-ipa \
            --workspace ios/Runner.xcworkspace \
            --scheme Runner

    artifacts:
      - build/ios/ipa/*.ipa

    publishing:
      app_store_connect:
        auth: integration
        submit_to_testflight: true