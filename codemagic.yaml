workflows:
  ios-workflow:
    name: iOS Workflow

    integrations:
      app_store_connect: poker-app-codemagic

    environment:
      flutter: stable
      xcode: latest
      ios_signing:
        provisioning_profiles:
          - app_store_profile_v2

    scripts:
      - flutter clean
      - flutter pub get
      - cd ios && pod install && cd ..

      - name: Set up code signing
        script: xcode-project use-profiles

      - name: Build IPA
        script: |
          xcode-project build-ipa \
            --workspace ios/Runner.xcworkspace \
            --scheme Runner

    artifacts:
      - build/ios/ipa/*.ipa

    publishing:
      app_store_connect:
        auth: integration
        submit_to_testflight: true