workflows:
  ios-workflow:
    name: iOS Workflow

    integrations:
      app_store_connect: poker-app-codemagic

    environment:
      flutter: stable
      xcode: latest
      ios_signing:
        distribution_type: app_store
        bundle_identifier: com.joetseng.pokertablereservation
        provisioning_profiles:
          - app_store_profile

    scripts:
      - flutter clean
      - flutter pub get
      - cd ios && pod install && cd ..
      - name: Set up code signing settings on Xcode project
        script: xcode-project use-profiles

      # 👇 關鍵改這裡
      - flutter build ios --release --no-codesign
      - xcode-project build-ipa --workspace ios/Runner.xcworkspace --scheme Runner

    artifacts:
      - build/ios/ipa/*.ipa
      - build/ios/archive/*.xcarchive

    publishing:
      app_store_connect:
        auth: integration
        submit_to_testflight: true