workflows:
  ios-workflow:
    name: iOS Workflow

    environment:
      flutter: stable
      xcode: latest

      ios_signing:
        distribution_type: app_store
        bundle_identifier: com.joetseng.pokertablereservation

      vars:
        CM_PROVISIONING_PROFILE: app_store_profile
        CM_CERTIFICATE: ios_distribution

    scripts:
      - flutter clean
      - flutter pub get
      - cd ios && pod install && cd ..
      - flutter build ipa --release --export-options-plist=ios/ExportOptions.plist

    artifacts:
      - build/ios/ipa/*.ipa